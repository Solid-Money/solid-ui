name: Deploy mobile QA

# Builds internal-distribution (preview) apps on every push to `qa`, so QA
# testers can install the latest QA build by scanning the EAS build QR code.
on:
  push:
    branches: ['qa']

jobs:
  android_build:
    name: Build Android
    type: build
    params:
      platform: android
      profile: preview
  ios_build:
    name: Build iOS
    type: build
    params:
      platform: ios
      profile: preview
